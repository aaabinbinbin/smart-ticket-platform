spring:
  application:
    name: smart-ticket-platform
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/smart_ticket_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 192.168.100.128
      port: 6379
      password:
      database: 1
      timeout: 3s
  rabbitmq:
    host: 192.168.100.128
    port: 5672
    username: admin
    password: admin
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3
  ai:
    model:
      chat: openai
      embedding: openai
    openai:
      api-key: ${MY_API_KEY:}
      base-url: ${MY_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      chat:
        options:
          model: kimi-k2.5
          temperature: 0.1
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1536
    vectorstore:
      pgvector:
        initialize-schema: true
        schema-name: public
        table-name: vector_store
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        max-document-batch-size: 1000

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

smart-ticket:
  knowledge:
    rabbit:
      enabled: true
    task:
      max-retries: 5
      relay-batch-size: 20
      relay-fixed-delay-ms: 30000
  ticket:
    enrichment:
      llm-enabled: false
      llm-timeout-ms: 3000
      llm-max-retry: 0
      llm-min-confidence: 0.6
  ai:
    chat:
      enabled: true
    embedding:
      enabled: true
    vector-store:
      enabled: true
    pgvector:
      url: jdbc:postgresql://192.168.100.128:5432/smart_ticket_vector
      username: postgres
      password: 123456
  jwt:
    secret: ${SMART_TICKET_JWT_SECRET:smart-ticket-platform-local-jwt-secret-change-me}
    expiration-minutes: ${SMART_TICKET_JWT_EXPIRATION:120}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

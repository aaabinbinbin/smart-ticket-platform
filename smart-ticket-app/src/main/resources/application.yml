spring:
  application:
    name: smart-ticket-platform
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/smart_ticket_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456
      database: 1
      timeout: 3s
  ai:
    model:
      chat: none
      embedding: none
    openai:
      api-key: ${MY_API_KEY:}
      base-url: ${MY_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: kimi-k2.5
          temperature: 0.1
      embedding:
        options:
          model: multimodal-embedding-v1
    vectorstore:
      pgvector:
        initialize-schema: false
        schema-name: public
        table-name: vector_store
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        max-document-batch-size: 1000

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

smart-ticket:
  ai:
    chat:
      enabled: false
    embedding:
      enabled: false
    vector-store:
      enabled: false
    pgvector:
      url: jdbc:postgresql://127.0.0.1:5432/smart_ticket_vector
  jwt:
    secret: smart-ticket-platform-local-jwt-secret-change-me-please-20260417
    expiration-minutes: 120

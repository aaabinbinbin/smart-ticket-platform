openapi: 3.0.3
info:
  title: Smart Ticket Platform - Auth and RBAC
  version: 0.0.1
  description: |
    登录认证与基础 RBAC 接口集合。

    本文件用于导入 Apifox 后获取 JWT，并验证 USER / STAFF / ADMIN 三类角色访问控制。

    登录成功后，将 data.accessToken 保存到环境变量，例如：

    userToken / staffToken / adminToken
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: Auth
    description: 登录认证接口
  - name: Security Examples
    description: 基础 RBAC 示例接口
paths:
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: 用户登录
      description: 使用用户名和密码登录，成功后返回 JWT accessToken。
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              user1:
                summary: 普通用户
                value:
                  username: user1
                  password: '123456'
              staff1:
                summary: 处理人员
                value:
                  username: staff1
                  password: '123456'
              admin1:
                summary: 管理员
                value:
                  username: admin1
                  password: '123456'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                userLogin:
                  summary: user1 登录成功
                  value:
                    success: true
                    code: SUCCESS
                    message: 操作成功
                    data:
                      accessToken: eyJhbGciOiJIUzI1NiJ9.example
                      tokenType: Bearer
                      expiresIn: 7200
                      userId: 1
                      username: user1
                      realName: 普通员工
                      roles:
                        - USER
                adminLogin:
                  summary: admin1 登录成功
                  value:
                    success: true
                    code: SUCCESS
                    message: 操作成功
                    data:
                      accessToken: eyJhbGciOiJIUzI1NiJ9.example
                      tokenType: Bearer
                      expiresIn: 7200
                      userId: 3
                      username: admin1
                      realName: 管理员
                      roles:
                        - USER
                        - STAFF
                        - ADMIN
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/LoginUnauthorized'
  /api/examples/security/me:
    get:
      tags:
        - Security Examples
      summary: 查看当前登录用户
      description: 任意已登录用户都可以访问，返回当前用户 ID、用户名、真实姓名和角色。
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
              example:
                success: true
                code: SUCCESS
                message: 操作成功
                data:
                  userId: 1
                  username: user1
                  realName: 普通员工
                  roles:
                    - USER
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/examples/security/user:
    get:
      tags:
        - Security Examples
      summary: USER 角色示例
      description: 需要 USER 角色。user1、staff1、admin1 都可以访问。
      operationId: userRoleExample
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 访问成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                success: true
                code: SUCCESS
                message: 操作成功
                data: 当前用户具备 USER 角色
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/examples/security/staff:
    get:
      tags:
        - Security Examples
      summary: STAFF 角色示例
      description: 需要 STAFF 角色。staff1、admin1 可以访问，user1 会返回 403。
      operationId: staffRoleExample
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 访问成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                success: true
                code: SUCCESS
                message: 操作成功
                data: 当前用户具备 STAFF 角色
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/examples/security/admin:
    get:
      tags:
        - Security Examples
      summary: ADMIN 角色示例
      description: 需要 ADMIN 角色。admin1 可以访问，user1 和 staff1 会返回 403。
      operationId: adminRoleExample
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 访问成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                success: true
                code: SUCCESS
                message: 操作成功
                data: 当前用户具备 ADMIN 角色
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: 登录用户名。
          example: user1
        password:
          type: string
          description: 登录密码。
          example: '123456'
    LoginResult:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT 访问令牌。
        tokenType:
          type: string
          description: 令牌类型，固定为 Bearer。
          example: Bearer
        expiresIn:
          type: integer
          format: int64
          description: 过期时间，单位秒。
          example: 7200
        userId:
          type: integer
          format: int64
          description: 用户 ID。
        username:
          type: string
          description: 用户名。
        realName:
          type: string
          description: 用户真实姓名。
        roles:
          type: array
          description: 用户角色编码。
          items:
            type: string
            enum:
              - USER
              - STAFF
              - ADMIN
    CurrentUser:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        username:
          type: string
        realName:
          type: string
        roles:
          type: array
          items:
            type: string
            enum:
              - USER
              - STAFF
              - ADMIN
    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
        data:
          $ref: '#/components/schemas/LoginResult'
    CurrentUserResponse:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
        data:
          $ref: '#/components/schemas/CurrentUser'
    StringResponse:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
        data:
          type: string
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        code:
          type: string
        message:
          type: string
        data:
          nullable: true
  responses:
    ValidationError:
      description: 参数校验失败
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            code: VALIDATION_FAILED
            message: 用户名不能为空
            data: null
    LoginUnauthorized:
      description: 用户名或密码错误，或账号禁用
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            badCredentials:
              summary: 用户名或密码错误
              value:
                success: false
                code: BAD_CREDENTIALS
                message: 用户名或密码错误
                data: null
            disabled:
              summary: 账号禁用
              value:
                success: false
                code: ACCOUNT_DISABLED
                message: 账号已被禁用
                data: null
    Unauthorized:
      description: 未登录或 Token 无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            code: UNAUTHORIZED
            message: 请先登录或提供有效令牌
            data: null
    Forbidden:
      description: 已登录但权限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            code: FORBIDDEN
            message: 当前用户没有访问权限
            data: null
